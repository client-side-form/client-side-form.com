<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" aria-label="Client-Side Form logo">
  <!-- Background rounded rect -->
  <rect width="64" height="64" rx="14" fill="#1a1a3e"/>
  <!-- Form outline -->
  <rect x="10" y="10" width="44" height="52" rx="5" fill="#f5f0f7" stroke="#7b4f8a" stroke-width="2"/>
  <!-- Title bar line -->
  <rect x="16" y="18" width="20" height="3" rx="1.5" fill="#7b4f8a"/>
  <!-- Field outlines -->
  <rect x="16" y="26" width="32" height="5" rx="2" fill="none" stroke="#9b6daa" stroke-width="1.5"/>
  <rect x="16" y="35" width="32" height="5" rx="2" fill="none" stroke="#9b6daa" stroke-width="1.5"/>
  <!-- Checkmark validation tick -->
  <circle cx="48" cy="28.5" r="4.5" fill="#5b3f7a"/>
  <polyline points="45.5,28.5 47.2,30.2 50.5,27" stroke="#e8c9f0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Submit button -->
  <rect x="16" y="44" width="18" height="6" rx="3" fill="#7b4f8a"/>
  <rect x="36" y="44" width="12" height="6" rx="3" fill="#c9a0dc" opacity="0.6"/>
  <!-- Decorative dot accent -->
  <circle cx="38" cy="19.5" r="2" fill="#c9a0dc"/>
  <circle cx="43" cy="19.5" r="2" fill="#e8c9f0" opacity="0.7"/>
</svg>

